services:
  - type: web
    name: apponcohb
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build && cd server && npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_PATH
        value: /data/onco_app.db
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-5
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
    disk:
      name: onco-data
      mountPath: /data
      sizeGB: 1
